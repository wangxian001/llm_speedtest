<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Speed Test Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #282c34;
            --bg-panel: #21252b;
            --text-main: #abb2bf;
            --text-muted: #5c6370;
            --accent-blue: #61afef;
            --accent-green: #98c379;
            --accent-purple: #c678dd;
            --accent-yellow: #e5c07b;
            --accent-red: #e06c75;
            --border-color: #3e4451;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            box-sizing: border-box;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--accent-blue);
            margin-bottom: 5px;
        }

        .header-sub {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 14px;
            gap: 10px;
        }

        .tabs-side {
            margin-left: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            max-width: 68%;
        }

        .tabs-utility {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            padding: 6px 8px;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.12);
        }

        .tabs-community {
            display: inline-flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-main);
            max-width: 460px;
        }

        .lang-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1400;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px;
            border: 1px solid rgba(97, 175, 239, 0.32);
            border-radius: 999px;
            background: rgba(21, 25, 32, 0.88);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
        }

        .lang-toggle-btn {
            appearance: none;
            -webkit-appearance: none;
            min-height: 32px;
            padding: 0 12px;
            border: 1px solid transparent;
            border-radius: 999px;
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
            font: inherit;
            font-size: 12px;
            font-weight: bold;
            line-height: 1;
            transition: all 0.2s ease;
            white-space: nowrap;
            position: relative;
        }

        .lang-toggle-btn:hover {
            color: #fff;
            border-color: rgba(97, 175, 239, 0.4);
        }

        .lang-toggle-btn.active {
            color: #11161d;
            border-color: rgba(97, 175, 239, 0.92);
            background: linear-gradient(135deg, rgba(97, 175, 239, 0.98), rgba(152, 195, 121, 0.92));
            box-shadow: 0 0 0 1px rgba(97, 175, 239, 0.18);
        }

        .lang-toggle-btn:disabled {
            cursor: wait;
            opacity: 0.72;
        }

        .lang-toggle-btn.busy {
            opacity: 0.78;
            cursor: progress;
            padding-left: 30px;
        }

        .lang-toggle-btn.busy::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 50%;
            width: 10px;
            height: 10px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            transform: translateY(-50%);
            animation: lang-toggle-spin 0.75s linear infinite;
        }

        .lang-toggle-btn.busy::after {
            content: '...';
            display: inline-block;
            width: 0;
            margin-left: 2px;
            font-size: 11px;
            letter-spacing: 0.04em;
            overflow: hidden;
            vertical-align: bottom;
            animation: lang-toggle-dots 1.1s steps(4, end) infinite;
        }

        @keyframes lang-toggle-spin {
            to {
                transform: translateY(-50%) rotate(360deg);
            }
        }

        @keyframes lang-toggle-dots {
            0%,
            20% {
                width: 0;
            }
            40% {
                width: 0.38em;
            }
            60% {
                width: 0.76em;
            }
            80%,
            100% {
                width: 1.14em;
            }
        }

        .tab-btn {
            background: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 9px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            border-color: var(--accent-blue);
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: #282c34;
            border-color: var(--accent-blue);
        }

        /* Table */
        .table-container {
            background: var(--bg-panel);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th,
        td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            color: var(--accent-green);
            font-weight: bold;
            position: sticky;
            top: 0;
            background: var(--bg-panel);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-detail {
            background: var(--accent-purple);
            color: #fff;
            border: none;
            padding: 3px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9px;
            line-height: 1.1;
            min-height: 22px;
            white-space: nowrap;
        }

        .btn-detail:hover {
            opacity: 0.9;
        }

        /* Modal for Charts */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: var(--bg-dark);
            margin: 5% auto;
            padding: 30px;
            border: 1px solid var(--border-color);
            width: 95%;
            max-width: 1600px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .close-btn {
            color: var(--text-muted);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            margin-top: -10px;
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .chart-box {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }

        /* Tooltip for Notes */
        .notes-cell {
            position: relative;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-muted);
            max-width: 150px;
            white-space: nowrap;
        }

        .notes-text {
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            vertical-align: bottom;
        }

        .notes-tooltip {
            visibility: hidden;
            background-color: var(--bg-dark);
            color: var(--text-main);
            text-align: left;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px;
            position: absolute;
            z-index: 10;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            white-space: normal;
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            /* Prevent tooltip from interfering with hover */
        }

        .notes-cell:hover .notes-tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* Small arrow for tooltip */
        .notes-tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--border-color) transparent transparent transparent;
        }

        @media (max-width: 900px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .lang-toggle {
                top: 12px;
                right: 12px;
                padding: 3px;
            }

            .lang-toggle-btn {
                min-height: 30px;
                padding: 0 10px;
                font-size: 11px;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--accent-yellow);
            font-size: 16px;
        }

        .entry-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 28px;
            padding: 0 10px;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.14);
            color: var(--text-main);
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .entry-link-btn:hover {
            border-color: var(--accent-blue);
            color: #fff;
            transform: translateY(-1px);
        }

        button.entry-link-btn {
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            font: inherit;
        }

        #manualViewToggleBtn {
            min-height: 26px;
            padding: 0 10px;
            font-size: 11px;
            letter-spacing: 0.1px;
            border-color: rgba(97, 175, 239, 0.48);
            color: #cfe6ff;
            background: linear-gradient(135deg, rgba(97, 175, 239, 0.24), rgba(97, 175, 239, 0.1));
            box-shadow: inset 0 0 0 1px rgba(97, 175, 239, 0.2);
        }

        #manualViewToggleBtn:hover {
            border-color: #61afef;
            color: #fff;
            background: linear-gradient(135deg, rgba(97, 175, 239, 0.34), rgba(97, 175, 239, 0.14));
            transform: translateY(-1px);
        }

        #manualViewToggleBtn.active {
            border-color: var(--accent-green);
            color: #10161f;
            background: linear-gradient(135deg, rgba(152, 195, 121, 0.96), rgba(152, 195, 121, 0.8));
            box-shadow: 0 0 0 1px rgba(152, 195, 121, 0.38);
        }

        .entry-link-btn.primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #11161d;
        }

        .community-title {
            color: var(--accent-yellow);
            font-size: 12px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 999px;
            background: rgba(229, 192, 123, 0.12);
            white-space: nowrap;
        }

        .community-meta {
            color: var(--text-main);
            font-size: 11px;
            line-height: 1.3;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .community-copy-btn {
            background: transparent;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
            border-radius: 999px;
            padding: 4px 9px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
            min-height: 28px;
        }

        .community-copy-btn:hover {
            opacity: 0.9;
        }

        .model-tags-panel {
            margin-bottom: 12px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(97, 175, 239, 0.14), rgba(33, 37, 43, 0.92));
        }

        .model-tags-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .model-tags-title {
            color: var(--accent-blue);
            font-size: 14px;
            font-weight: bold;
        }

        .model-tags-subtitle {
            color: var(--text-muted);
            font-size: 12px;
        }

        .model-tag-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .model-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 999px;
            padding: 6px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
        }

        .model-tag:hover {
            border-color: var(--accent-blue);
            color: #fff;
            transform: translateY(-1px);
        }

        .model-tag.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #11161d;
            font-weight: bold;
        }

        .model-tag-count {
            min-width: 20px;
            padding: 2px 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            color: inherit;
            font-size: 12px;
            text-align: center;
        }

        .leaderboard-tools {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 0;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.16);
        }

        .leaderboard-tools-wrap {
            margin-bottom: 12px;
        }

        .mobile-filter-toggle {
            display: none;
            width: 100%;
            margin-bottom: 8px;
            background: rgba(97, 175, 239, 0.12);
            color: var(--accent-blue);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-align: left;
            transition: all 0.2s ease;
        }

        .mobile-filter-toggle:hover {
            border-color: var(--accent-blue);
            color: #fff;
        }

        .leaderboard-tools-wrap.collapsed .leaderboard-tools {
            display: none;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 120px;
        }

        .tool-group label {
            font-size: 12px;
            color: var(--text-muted);
        }

        .tool-group input,
        .tool-group select {
            background: var(--bg-panel);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 13px;
        }

        .rank-cell {
            font-weight: bold;
            min-width: 68px;
        }

        .col-rank {
            width: 74px;
            min-width: 74px;
        }

        tr.top-rank-1 {
            background: rgba(229, 192, 123, 0.16);
        }

        tr.top-rank-2 {
            background: rgba(171, 178, 191, 0.12);
        }

        tr.top-rank-3 {
            background: rgba(198, 120, 221, 0.12);
        }

        .btn-copy-link {
            background: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 3px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 9px;
            margin-left: 0;
            min-height: 22px;
            line-height: 1.1;
            white-space: nowrap;
        }

        .col-notes {
            width: 9%;
            min-width: 120px;
            max-width: 160px;
        }

        .col-source-tags {
            width: 9%;
            min-width: 110px;
            max-width: 150px;
            white-space: normal;
            word-break: break-word;
            line-height: 1.25;
        }

        .col-prefill,
        .col-decode {
            width: 92px;
            min-width: 92px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .col-actions {
            width: 146px;
            min-width: 146px;
            text-align: left;
            white-space: nowrap;
        }

        #resultsTable th.col-rank,
        #resultsTable td.col-rank,
        #resultsTable th.col-prefill,
        #resultsTable td.col-prefill,
        #resultsTable th.col-decode,
        #resultsTable td.col-decode {
            padding-left: 9px;
            padding-right: 9px;
        }

        #resultsTable th.col-actions,
        #resultsTable td.col-actions {
            padding-left: 7px;
            padding-right: 7px;
        }

        .row-actions {
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            gap: 3px;
            white-space: nowrap;
        }

        .btn-copy-link:hover {
            opacity: 0.9;
        }

        .sortable-header {
            padding: 0;
        }

        .sort-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 12px 15px;
            background: transparent;
            color: inherit;
            border: none;
            font: inherit;
            text-align: left;
            cursor: pointer;
        }

        .sort-toggle:hover {
            color: var(--accent-blue);
        }

        .sort-label {
            line-height: 1.35;
        }

        .sort-indicator {
            min-width: 18px;
            color: var(--text-muted);
            font-size: 12px;
            text-align: right;
        }

        .sort-indicator.active {
            color: var(--accent-yellow);
        }

        @media (max-width: 900px) {
            body {
                padding: 8px;
            }

            .container {
                max-width: 100%;
            }

            h1 {
                font-size: 22px;
                margin: 0 0 4px;
            }

            .header-sub {
                font-size: 12px;
                margin-bottom: 12px;
            }

            .tabs {
                gap: 8px;
                margin-bottom: 10px;
                align-items: stretch;
            }

            .tab-btn {
                padding: 7px 10px;
                font-size: 13px;
            }

            .tabs-side {
                width: 100%;
                margin-left: 0;
                align-items: stretch;
            }

            .tabs-utility {
                justify-content: flex-start;
                gap: 6px;
            }

            .tabs-community {
                width: 100%;
                font-size: 10px;
            }

            .community-meta {
                font-size: 10px;
                line-height: 1.25;
            }

            .entry-link-btn,
            .community-copy-btn {
                min-height: 26px;
                padding: 0 9px;
                font-size: 11px;
            }

            #manualViewToggleBtn {
                min-height: 24px;
                padding: 0 8px;
                font-size: 10px;
            }

            .model-tags-panel {
                margin-bottom: 8px;
                padding: 8px;
            }

            .model-tags-header {
                margin-bottom: 6px;
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }

            .model-tags-title {
                font-size: 12px;
            }

            .model-tags-subtitle {
                font-size: 11px;
                line-height: 1.3;
            }

            .model-tag-bar {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                gap: 6px;
                padding-bottom: 2px;
            }

            .model-tag {
                flex: 0 0 auto;
                padding: 5px 9px;
                font-size: 11px;
            }

            .leaderboard-tools-wrap {
                margin-bottom: 10px;
            }

            .mobile-filter-toggle {
                display: block;
            }

            .leaderboard-tools {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
                padding: 8px;
            }

            .leaderboard-tools .tool-group {
                width: auto !important;
                min-width: 0 !important;
            }

            .leaderboard-tools .tool-group label {
                font-size: 11px;
            }

            .leaderboard-tools .tool-group input,
            .leaderboard-tools .tool-group select {
                font-size: 12px;
                padding: 5px 6px;
            }

            .leaderboard-tools .tab-btn {
                width: 100%;
                padding: 6px 8px;
                font-size: 12px;
            }

            .table-container {
                padding: 8px;
                border-radius: 6px;
            }

            #resultsTable {
                font-size: 11px;
                table-layout: fixed;
            }

            #resultsTable th,
            #resultsTable td {
                padding: 5px 3px;
            }

            .sort-toggle {
                padding: 5px 3px;
                gap: 3px;
            }

            .sort-label {
                line-height: 1.25;
                font-size: 11px;
            }

            .sort-indicator {
                min-width: 12px;
                font-size: 10px;
            }

            .col-rank,
            .col-time,
            .col-share-id,
            .col-user,
            .col-notes,
            .col-source-tags,
            .col-concurrency {
                display: none;
            }

            .col-model,
            .col-config {
                white-space: normal;
                word-break: break-word;
                line-height: 1.28;
                vertical-align: top;
            }

            .col-model {
                width: 24%;
                min-width: 78px;
                font-size: 11px;
            }

            .col-config {
                width: 28%;
                min-width: 90px;
                font-size: 10px;
                color: var(--text-muted);
            }

            .col-source-tags {
                width: 18%;
                min-width: 110px;
                white-space: normal;
                word-break: break-word;
                line-height: 1.3;
                vertical-align: top;
                color: var(--text-muted);
            }

            .col-prefill,
            .col-decode {
                width: 16%;
                min-width: 54px;
                text-align: right;
                font-variant-numeric: tabular-nums;
            }

            .col-actions {
                width: 16%;
                min-width: 58px;
                text-align: center;
                position: sticky;
                right: 0;
                background: var(--bg-panel);
                z-index: 3;
                white-space: nowrap;
            }

            .btn-detail {
                font-size: 10px;
                padding: 4px 5px;
            }

            .btn-copy-link {
                display: none;
            }

            #paginationControls {
                margin-top: 10px !important;
            }

            #paginationControls .tab-btn {
                padding: 4px 8px !important;
                margin: 0 3px !important;
                font-size: 12px;
            }

            .modal-content {
                width: 98%;
                margin: 2% auto;
                padding: 12px;
            }

        const translationCache = new Map();
        let currentPageLanguage = PAGE_LANGUAGE.ZH;
        let translationObserver = null;
        let translationScheduled = false;
        let translationGeneration = 0;
        let isApplyingTranslations = false;
        let translationProviderLabel = '';
        let translationLastErrorMessage = '';
        let translationCachePersistTimer = null;
        let translationRetryCooldownUntil = 0;
        let myMemoryNextRequestAt = 0;
        let activeTranslationPromise = null;
        let translationNeedsRerun = false;
        let languageToggleBusy = false;
        let edgeTranslatorSession = null;
        let edgeTranslatorPromise = null;

        // Chart instances
        let charts = {
            prefill: null,
            decode: null,
            ttft: null,
            itl: null
        };

        function getShareIdFromUrl() {
            const params = new URLSearchParams(window.location.search || '');
            return (params.get('id') || params.get('share_id') || params.get('shareId') || '').trim();
        }

        function getModelTagMinCountFromUrl() {
            const params = new URLSearchParams(window.location.search || '');
            const raw = (params.get('model_tag_min_count') || params.get('tag_min_count') || params.get('modelTagMinCount') || '').trim();
            const parsed = parseInt(raw, 10);
            if (!Number.isFinite(parsed) || parsed < 1) return DEFAULT_MODEL_TAG_MIN_COUNT;
            return parsed;
        }

        function getStoredPageLanguage() {
            try {
                return localStorage.getItem(PAGE_LANGUAGE_STORAGE_KEY) === PAGE_LANGUAGE.EN ? PAGE_LANGUAGE.EN : PAGE_LANGUAGE.ZH;
            } catch (_) {
                return PAGE_LANGUAGE.ZH;
            }
        }

        function persistPageLanguage() {
            try {
                localStorage.setItem(PAGE_LANGUAGE_STORAGE_KEY, currentPageLanguage);
            } catch (_) {
                // Ignore storage failures in privacy mode or restricted environments.
            }
        }

        function loadPersistedTranslationCache() {
            try {
                const raw = localStorage.getItem(TRANSLATION_CACHE_STORAGE_KEY);
                if (!raw) return;

                const parsed = JSON.parse(raw);
                if (!Array.isArray(parsed)) return;

                parsed.forEach((entry) => {
                    if (!Array.isArray(entry) || entry.length < 2) return;
                    const [sourceText, translatedText] = entry;
                    if (typeof sourceText !== 'string' || typeof translatedText !== 'string') return;
                    translationCache.set(sourceText, translatedText);
                });
            } catch (_) {
                // Ignore invalid cache payloads.
            }
        }

        function persistTranslationCacheNow() {
            try {
                const entries = Array.from(translationCache.entries()).slice(-TRANSLATION_CACHE_MAX_ITEMS);
                localStorage.setItem(TRANSLATION_CACHE_STORAGE_KEY, JSON.stringify(entries));
            } catch (_) {
                // Ignore storage quota or privacy-mode failures.
            }
        }

        function schedulePersistTranslationCache() {
            if (translationCachePersistTimer) return;

            translationCachePersistTimer = window.setTimeout(() => {
                translationCachePersistTimer = null;
                persistTranslationCacheNow();
            }, 200);
        }

        function setTranslationCacheValue(sourceText, translatedText) {
            if (typeof sourceText !== 'string' || !sourceText) return;

            const normalizedTranslation = typeof translatedText === 'string' && translatedText
                ? translatedText
                : sourceText;

            if (translationCache.has(sourceText)) {
                translationCache.delete(sourceText);
            }
            translationCache.set(sourceText, normalizedTranslation);

            while (translationCache.size > TRANSLATION_CACHE_MAX_ITEMS) {
                const oldestKey = translationCache.keys().next().value;
                if (oldestKey === undefined) break;
                translationCache.delete(oldestKey);
            }

            schedulePersistTranslationCache();
        }

        function containsChineseText(text) {
            return CHINESE_TEXT_RE.test(String(text || ''));
        }

        function canUseEdgeNativeTranslator() {
            return window.location.protocol !== 'file:';
        }

        function splitTextPadding(text) {
            const raw = String(text || '');
            const match = raw.match(/^(\s*)([\s\S]*?)(\s*)$/);
            return {
                leading: match ? match[1] : '',
                core: match ? match[2] : raw,
                trailing: match ? match[3] : ''
            };
        }

        function shouldSkipElement(element) {
            if (!(element instanceof Element)) return true;
            const tagName = element.tagName;
            if (['SCRIPT', 'STYLE', 'NOSCRIPT', 'IFRAME', 'CANVAS', 'SVG', 'MATH'].includes(tagName)) return true;
            return !!element.closest('[data-translate-skip="true"]');
        }

        function walkTextNodes(root, callback) {
            if (!(root instanceof Node)) return;
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
            let current = walker.nextNode();
            while (current) {
                callback(current);
                current = walker.nextNode();
            }
        }

        function walkElementNodes(root, callback) {
            if (!(root instanceof Element)) return;
            callback(root);
            root.querySelectorAll('*').forEach(callback);
        }

        function getElementOriginalAttrs(element) {
            let state = elementAttributeOriginalMap.get(element);
            if (!state) {
                state = {};
                elementAttributeOriginalMap.set(element, state);
            }
            return state;
        }

        function getElementTranslatedAttrs(element) {
            let state = translatedElementAttrsMap.get(element);
            if (!state) {
                state = new Set();
                translatedElementAttrsMap.set(element, state);
            }
            return state;
        }

        function getLanguageToggleTitle() {
            if (languageToggleBusy) {
                return translationProviderLabel
                    ? `正在后台翻译页面，可继续操作。当前服务: ${translationProviderLabel}`
                    : '正在后台翻译页面，可继续操作';
            }

            if (Date.now() < translationRetryCooldownUntil) {
                return '公共翻译接口限流中，请稍后再试';
            }

            if (translationLastErrorMessage) {
                return translationLastErrorMessage;
            }

            if (translationProviderLabel) {
                return `当前翻译服务: ${translationProviderLabel}`;
            }

            return '切换页面语言';
        }

        function updateLanguageToggleState(isBusy = languageToggleBusy) {
            const zhBtn = document.getElementById('langToggleZh');
            const enBtn = document.getElementById('langToggleEn');
            if (!zhBtn || !enBtn) return;

            languageToggleBusy = !!isBusy;
            zhBtn.classList.toggle('active', currentPageLanguage === PAGE_LANGUAGE.ZH);
            enBtn.classList.toggle('active', currentPageLanguage === PAGE_LANGUAGE.EN);
            zhBtn.disabled = false;
            enBtn.disabled = false;
            zhBtn.classList.toggle('busy', languageToggleBusy && currentPageLanguage === PAGE_LANGUAGE.ZH);
            enBtn.classList.toggle('busy', languageToggleBusy && currentPageLanguage === PAGE_LANGUAGE.EN);
            zhBtn.setAttribute('aria-busy', String(languageToggleBusy && currentPageLanguage === PAGE_LANGUAGE.ZH));
            enBtn.setAttribute('aria-busy', String(languageToggleBusy && currentPageLanguage === PAGE_LANGUAGE.EN));

            const title = getLanguageToggleTitle();
            zhBtn.title = title;
            enBtn.title = title;
        }

        function initializePageTranslation() {
            if (translationObserver) return;

            translationObserver = new MutationObserver((mutations) => {
                if (currentPageLanguage !== PAGE_LANGUAGE.EN || isApplyingTranslations) return;

                for (const mutation of mutations) {
                    if (mutation.type === 'characterData') {
                        schedulePageTranslation();
                        return;
                    }
                    if (mutation.type === 'childList' && (mutation.addedNodes.length || mutation.removedNodes.length)) {
                        schedulePageTranslation();
                        return;
                    }
                    if (mutation.type === 'attributes' && TRANSLATABLE_ATTRS.includes(mutation.attributeName || '')) {
                        schedulePageTranslation();
                        return;
                    }
                }
            });

            translationObserver.observe(document.body, {
                childList: true,
                subtree: true,
                characterData: true,
                attributes: true,
                attributeFilter: TRANSLATABLE_ATTRS
            });
        }

        function schedulePageTranslation() {
            if (currentPageLanguage !== PAGE_LANGUAGE.EN || translationScheduled) return;
            if (Date.now() < translationRetryCooldownUntil) return;

            translationScheduled = true;
            window.setTimeout(() => {
                translationScheduled = false;
                translateCurrentPage(translationGeneration).catch((error) => {
                    console.error('Scheduled page translation failed:', error);
                });
            }, 150);
        }

        function switchPageLanguage(nextLanguage, options = {}) {
            const normalized = nextLanguage === PAGE_LANGUAGE.EN ? PAGE_LANGUAGE.EN : PAGE_LANGUAGE.ZH;
            currentPageLanguage = normalized;
            document.documentElement.lang = normalized;

            if (options.persist !== false) {
                persistPageLanguage();
            }

            translationGeneration += 1;
            const generation = translationGeneration;
            translationLastErrorMessage = '';

            if (normalized === PAGE_LANGUAGE.ZH) {
                translationNeedsRerun = false;
                restoreOriginalPageText(document.body);
                document.title = ORIGINAL_DOCUMENT_TITLE;
                updateLanguageToggleState(false);
                return;
            }

            updateLanguageToggleState(true);
            translateCurrentPage(generation).catch((error) => {
                console.error('Page translation failed:', error);
                if (!canUseEdgeNativeTranslator() && options.showFailureAlert !== false) {
                    console.warn('当前通过 file:// 打开页面时，公共翻译接口无法稳定一次性处理整页内容。请运行 Start_Leaderboard_Localhost.bat，再用 Edge 打开 localhost 版本后切换 English。');
                }
            }).finally(() => {
                if (generation === translationGeneration) {
                    updateLanguageToggleState(false);
                }
            });
        }

        function restoreOriginalPageText(root = document.body) {
            if (!(root instanceof Node)) return;

            isApplyingTranslations = true;
            try {
                walkTextNodes(root, (node) => {
                    if (!textNodeOriginalMap.has(node)) return;
                    node.nodeValue = textNodeOriginalMap.get(node);
                    translatedTextNodeSet.delete(node);
                });

                if (root instanceof Element) {
                    walkElementNodes(root, (element) => {
                        const originalAttrs = elementAttributeOriginalMap.get(element);
                        if (!originalAttrs) return;

                        const translatedAttrs = translatedElementAttrsMap.get(element);
                        Object.entries(originalAttrs).forEach(([attr, value]) => {
                            element.setAttribute(attr, value);
                            translatedAttrs?.delete(attr);
                        });
                    });
                }
            } finally {
                isApplyingTranslations = false;
            }
        }

        function buildTranslationTaskGroups(tasks) {
            const groups = new Map();

            tasks.forEach((task) => {
                if (!groups.has(task.sourceText)) {
                    groups.set(task.sourceText, []);
                }
                groups.get(task.sourceText).push(task.apply);
            });

            return groups;
        }

        function applyTranslatedTaskGroups(taskGroups, translatedMap) {
            if (!(translatedMap instanceof Map) || translatedMap.size === 0) return;

            isApplyingTranslations = true;
            try {
                translatedMap.forEach((translatedText, sourceText) => {
                    const handlers = taskGroups.get(sourceText);
                    if (handlers) {
                        handlers.forEach((applyTranslation) => applyTranslation(translatedText));
                    }
                });

                if (translatedMap.has(ORIGINAL_DOCUMENT_TITLE)) {
                    document.title = translatedMap.get(ORIGINAL_DOCUMENT_TITLE) || ORIGINAL_DOCUMENT_TITLE;
                }
            } finally {
                isApplyingTranslations = false;
            }
        }

        function collectTranslationTasks(root) {
            const tasks = [];
            if (!(root instanceof Node)) return tasks;

            walkTextNodes(root, (node) => {
                const parent = node.parentElement;
                if (!parent || shouldSkipElement(parent)) return;

                const currentText = node.nodeValue || '';
                if (!currentText.trim()) return;

                let originalText = textNodeOriginalMap.get(node);
                if (!originalText) {
                    originalText = currentText;
                    textNodeOriginalMap.set(node, originalText);
                } else if (!translatedTextNodeSet.has(node) && containsChineseText(currentText) && currentText !== originalText) {
                    originalText = currentText;
                    textNodeOriginalMap.set(node, originalText);
                }

                const originalParts = splitTextPadding(originalText);
                const cachedTranslated = translationCache.get(originalParts.core);
                const expectedTranslated = cachedTranslated !== undefined
                    ? `${originalParts.leading}${cachedTranslated}${originalParts.trailing}`
                    : null;

                if (translatedTextNodeSet.has(node)) {
                    if (expectedTranslated !== null && currentText === expectedTranslated) return;
                    if (currentText === originalText) {
                        translatedTextNodeSet.delete(node);
                    } else if (containsChineseText(currentText)) {
                        originalText = currentText;
                        textNodeOriginalMap.set(node, originalText);
                        translatedTextNodeSet.delete(node);
                    } else {
                        return;
                    }
                }

                const parts = splitTextPadding(originalText);
                if (!containsChineseText(parts.core)) return;

                tasks.push({
                    sourceText: parts.core,
                    apply(translatedText) {
                        node.nodeValue = `${parts.leading}${translatedText}${parts.trailing}`;
                        translatedTextNodeSet.add(node);
                    }
                });
            });

            if (root instanceof Element) {
                walkElementNodes(root, (element) => {
                    if (shouldSkipElement(element)) return;

                    const originalAttrs = getElementOriginalAttrs(element);
                    const translatedAttrs = getElementTranslatedAttrs(element);

                    TRANSLATABLE_ATTRS.forEach((attr) => {
                        if (!element.hasAttribute(attr)) return;

                        const currentValue = element.getAttribute(attr) || '';
                        if (!currentValue.trim()) return;

                        if (!(attr in originalAttrs)) {
                            originalAttrs[attr] = currentValue;
                        } else if (!translatedAttrs.has(attr) && containsChineseText(currentValue) && currentValue !== originalAttrs[attr]) {
                            originalAttrs[attr] = currentValue;
                        }

                        const originalValue = originalAttrs[attr];
                        const expectedTranslated = translationCache.get(originalValue);

                        if (translatedAttrs.has(attr)) {
                            if (expectedTranslated !== undefined && currentValue === expectedTranslated) return;
                            if (currentValue === originalValue) {
                                translatedAttrs.delete(attr);
                            } else if (containsChineseText(currentValue)) {
                                originalAttrs[attr] = currentValue;
                                translatedAttrs.delete(attr);
                            } else {
                                return;
                            }
                        }

                        if (!containsChineseText(originalAttrs[attr])) return;

                        tasks.push({
                            sourceText: originalAttrs[attr],
                            apply(translatedText) {
                                element.setAttribute(attr, translatedText);
                                translatedAttrs.add(attr);
                            }
                        });
                    });
                });
            }

            return tasks;
        }

        async function translateCurrentPage(generation = translationGeneration) {
            if (currentPageLanguage !== PAGE_LANGUAGE.EN) return;

            updateLanguageToggleState(true);
            if (activeTranslationPromise) {
                translationNeedsRerun = true;
                return activeTranslationPromise;
            }

            activeTranslationPromise = (async () => {
                try {
                    let nextGeneration = generation;

                    while (currentPageLanguage === PAGE_LANGUAGE.EN) {
                        const requestGeneration = nextGeneration;
                        translationNeedsRerun = false;
                        await translateCurrentPageCore(requestGeneration);

                        if (currentPageLanguage !== PAGE_LANGUAGE.EN) break;
                        if (!translationNeedsRerun) break;
                        if (Date.now() < translationRetryCooldownUntil) break;

                        nextGeneration = translationGeneration;
                    }
                } finally {
                    activeTranslationPromise = null;
                    updateLanguageToggleState(false);
                }
            })();

            return activeTranslationPromise;
        }

        async function translateCurrentPageCore(generation = translationGeneration) {
            if (currentPageLanguage !== PAGE_LANGUAGE.EN) return;

            const tasks = collectTranslationTasks(document.body);
            const taskGroups = buildTranslationTaskGroups(tasks);
            const uniqueTexts = Array.from(new Set(tasks.map(task => task.sourceText)));
            if (containsChineseText(ORIGINAL_DOCUMENT_TITLE)) {
                uniqueTexts.push(ORIGINAL_DOCUMENT_TITLE);
            }

            const dedupedTexts = Array.from(new Set(uniqueTexts));
            if (!dedupedTexts.length) {
                translationLastErrorMessage = '';
                document.title = ORIGINAL_DOCUMENT_TITLE;
                return;
            }

            const cachedMap = new Map();
            dedupedTexts.forEach((text) => {
                if (translationCache.has(text)) {
                    cachedMap.set(text, translationCache.get(text) || text);
                }
            });

            if (cachedMap.size) {
                applyTranslatedTaskGroups(taskGroups, cachedMap);
            }

            const missingTexts = dedupedTexts.filter((text) => containsChineseText(text) && !cachedMap.has(text));
            if (!missingTexts.length) {
                translationLastErrorMessage = '';
                if (!cachedMap.has(ORIGINAL_DOCUMENT_TITLE)) {
                    document.title = ORIGINAL_DOCUMENT_TITLE;
                }
                return;
            }

            const batches = [missingTexts];
            for (const batch of batches) {
                if (generation !== translationGeneration || currentPageLanguage !== PAGE_LANGUAGE.EN) return;

                const translatedBatch = await translateBatchWithFallbacks(batch);
                if (generation !== translationGeneration || currentPageLanguage !== PAGE_LANGUAGE.EN) return;

                const translatedMap = new Map();
                batch.forEach((sourceText, index) => {
                    const translatedText = translatedBatch[index] || sourceText;
                    setTranslationCacheValue(sourceText, translatedText);
                    translatedMap.set(sourceText, translatedText);
                });

                applyTranslatedTaskGroups(taskGroups, translatedMap);
            }
        }

        function buildTranslationBatches(texts) {
            const batches = [];
            let currentBatch = [];
            let currentEncodedLength = 0;

            texts.forEach((text) => {
                const prefix = currentBatch.length ? TRANSLATE_SEPARATOR : '';
                const nextEncodedLength = currentEncodedLength + encodeURIComponent(prefix + text).length;

                if (currentBatch.length && nextEncodedLength > TRANSLATION_BATCH_MAX_ENCODED_LENGTH) {
                    batches.push(currentBatch);
                    currentBatch = [text];
                    currentEncodedLength = encodeURIComponent(text).length;
                    return;
                }

                currentBatch.push(text);
                currentEncodedLength = nextEncodedLength;
            });

            if (currentBatch.length) {
                batches.push(currentBatch);
            }

            return batches;
        }

        function buildTranslationBatchesByCharLength(texts, maxChars) {
            const batches = [];
            let currentBatch = [];
            let currentLength = 0;

            texts.forEach((text) => {
                const stringText = String(text || '');
                const nextLength = currentBatch.length
                    ? currentLength + TRANSLATE_SEPARATOR.length + stringText.length
                    : stringText.length;

                if (currentBatch.length && nextLength > maxChars) {
                    batches.push(currentBatch);
                    currentBatch = [stringText];
                    currentLength = stringText.length;
                    return;
                }

                currentBatch.push(stringText);
                currentLength = nextLength;
            });

            if (currentBatch.length) {
                batches.push(currentBatch);
            }

            return batches;
        }

        function splitTranslatedBatch(text, expectedCount) {
            const exact = String(text || '').split(TRANSLATE_SEPARATOR);
            if (exact.length === expectedCount) return exact;

            const normalized = String(text || '').split(new RegExp(`\\r?\\n\\s*\\[\\[\\s*${TRANSLATE_SEPARATOR_MARKER}\\s*\\]\\]\\s*\\r?\\n`, 'i'));
            if (normalized.length === expectedCount) return normalized;

            throw new Error(`Translated batch size mismatch: expected ${expectedCount}, got ${exact.length}`);
        }

        function isMyMemoryQueryTooLong(text) {
            return /QUERY LENGTH LIMIT EXCEEDED/i.test(String(text || ''));
        }

        function splitBatchInHalf(batch) {
            const middle = Math.ceil(batch.length / 2);
            return [batch.slice(0, middle), batch.slice(middle)];
        }

        function splitLongTextForTranslation(text, maxChars) {
            const source = String(text || '');
            if (source.length <= maxChars) return [source];

            const chunks = [];
            let remaining = source;

            while (remaining.length > maxChars) {
                let splitIndex = remaining.lastIndexOf('\n', maxChars);
                if (splitIndex < maxChars * 0.4) {
                    splitIndex = Math.max(
                        remaining.lastIndexOf('。', maxChars),
                        remaining.lastIndexOf('！', maxChars),
                        remaining.lastIndexOf('？', maxChars),
                        remaining.lastIndexOf('；', maxChars),
                        remaining.lastIndexOf('，', maxChars),
                        remaining.lastIndexOf(',', maxChars),
                        remaining.lastIndexOf(' ', maxChars)
                    );
                }
                if (splitIndex < maxChars * 0.4) {
                    splitIndex = maxChars;
                }

                chunks.push(remaining.slice(0, splitIndex));
                remaining = remaining.slice(splitIndex);
            }

            if (remaining) {
                chunks.push(remaining);
            }

            return chunks;
        }

        function isTranslationRateLimitError(error) {
            const message = String(error?.message || error || '');
            return /HTTP 429|rate limit|too many requests/i.test(message);
        }

        function setTranslationRetryCooldown(ms = TRANSLATION_AUTO_RETRY_COOLDOWN_MS) {
            translationRetryCooldownUntil = Date.now() + ms;
            updateLanguageToggleState();
        }

        function clearTranslationRetryCooldown() {
            translationRetryCooldownUntil = 0;
        }

        function waitForMs(ms) {
            return new Promise((resolve) => window.setTimeout(resolve, ms));
        }

        function bindPublicTranslationProgressiveEvents() {
            const onProgressiveTrigger = () => {
                if (currentPageLanguage !== PAGE_LANGUAGE.EN) return;
                schedulePageTranslation();
            };

            window.addEventListener('scroll', onProgressiveTrigger, { passive: true });
            window.addEventListener('touchmove', onProgressiveTrigger, { passive: true });
        }

        async function translateTextArray(texts, generation = translationGeneration) {
            const normalizedTexts = texts.map(text => String(text || ''));
            const missingTexts = normalizedTexts.filter(text => containsChineseText(text) && !translationCache.has(text));

            if (missingTexts.length) {
                const batches = buildTranslationBatches(Array.from(new Set(missingTexts)));

                for (const batch of batches) {
                    if (generation !== translationGeneration || currentPageLanguage !== PAGE_LANGUAGE.EN) break;
                    const translatedBatch = await translateBatchWithFallbacks(batch);
                    batch.forEach((sourceText, index) => {
                        setTranslationCacheValue(sourceText, translatedBatch[index] || sourceText);
                    });
                }
            }

            return normalizedTexts.map(text => translationCache.get(text) || text);
        }

        async function translateBatchWithFallbacks(batch) {
            const providers = [
                { label: 'MyMemory Public API', run: translateBatchWithMyMemory },
                { label: 'Google Translate Public API', run: translateBatchWithGoogle }
            ];

            if (canUseEdgeNativeTranslator()) {
                const edgeProvider = { label: 'Microsoft Edge Translator', run: translateBatchWithEdgeNative };
                if (PREFER_EDGE_NATIVE_TRANSLATOR) {
                    providers.unshift(edgeProvider);
                } else {
                    providers.push(edgeProvider);
                }
            }

            const errors = [];

            for (const provider of providers) {
                try {
                    const translated = await provider.run(batch);
                    if (!Array.isArray(translated) || translated.length !== batch.length) {
                        throw new Error(`Invalid translation batch from ${provider.label}`);
                    }
                    translationProviderLabel = provider.label;
                    translationLastErrorMessage = '';
                    clearTranslationRetryCooldown();
                    return translated;
                } catch (error) {
                    errors.push(`${provider.label}: ${error.message}`);
                }
            }

            let message = errors.join(' | ');
            if (!canUseEdgeNativeTranslator()) {
                message += ' | file:// 下公共翻译接口受限，建议改用 localhost 打开页面以启用 Edge 原生整页翻译';
            }
            const finalError = new Error(message);
            translationLastErrorMessage = message;
            if (isTranslationRateLimitError(finalError)) {
                setTranslationRetryCooldown();
            }
            throw finalError;
        }

        async function getEdgeTranslatorSession() {
            if (!canUseEdgeNativeTranslator()) {
                throw new Error('Translator API disabled on file:// pages');
            }

            if (edgeTranslatorSession) return edgeTranslatorSession;
            if (edgeTranslatorPromise) return edgeTranslatorPromise;

            const TranslatorCtor = window.Translator || self.Translator;
            if (!TranslatorCtor || typeof TranslatorCtor.create !== 'function' || typeof TranslatorCtor.availability !== 'function') {
                throw new Error('Translator API unavailable');
            }

            edgeTranslatorPromise = (async () => {
                const availability = await TranslatorCtor.availability({
                    sourceLanguage: 'zh-Hans',
                    targetLanguage: 'en'
                });

                if (availability === 'unavailable' || availability === false) {
                    throw new Error('zh-Hans -> en not available');
                }

                return TranslatorCtor.create({
                    sourceLanguage: 'zh-Hans',
                    targetLanguage: 'en'
                });
            })();

            try {
                edgeTranslatorSession = await edgeTranslatorPromise;
                return edgeTranslatorSession;
            } catch (error) {
                edgeTranslatorPromise = null;
                throw error;
            }
        }

        async function runWithConcurrency(items, concurrency, worker) {
            const results = new Array(items.length);
            let cursor = 0;

            async function consume() {
                while (cursor < items.length) {
                    const index = cursor++;
                    results[index] = await worker(items[index], index);
                }
            }

            const workers = Array.from({ length: Math.max(1, Math.min(concurrency, items.length)) }, () => consume());
            await Promise.all(workers);
            return results;
        }

        async function translateBatchWithEdgeNative(batch) {
            const translator = await getEdgeTranslatorSession();
            const translated = await translator.translate(batch.join(TRANSLATE_SEPARATOR));
            const translatedText = typeof translated === 'string' ? translated : String(translated || batch.join(TRANSLATE_SEPARATOR));
            return splitTranslatedBatch(translatedText, batch.length);
        }

        async function translateBatchWithMyMemory(batch) {
            const joinedText = batch.join(TRANSLATE_SEPARATOR);
            if (joinedText.length > MYMEMORY_MAX_QUERY_CHARS) {
                throw new Error('Single-shot public translation exceeds MyMemory length limit');
            }
            return translateBatchWithMyMemoryRequest(batch);
        }

        async function translateBatchWithMyMemoryRequest(batch) {
            const url = new URL('https://api.mymemory.translated.net/get');
            url.searchParams.set('q', batch.join(TRANSLATE_SEPARATOR));
            url.searchParams.set('langpair', 'zh-CN|en');

            let lastError = null;

            for (let attempt = 0; attempt <= MYMEMORY_RETRY_DELAYS_MS.length; attempt++) {
                const now = Date.now();
                const waitMs = Math.max(0, myMemoryNextRequestAt - now);
                if (waitMs > 0) {
                    await waitForMs(waitMs);
                }

                myMemoryNextRequestAt = Date.now() + MYMEMORY_REQUEST_SPACING_MS;

                const response = await fetch(url.toString());
                if (response.ok) {
                    const payload = await response.json();
                    const translatedText = payload?.responseData?.translatedText
                        ? String(payload.responseData.translatedText)
                        : batch.join(TRANSLATE_SEPARATOR);

                    if (isMyMemoryQueryTooLong(translatedText)) {
                        throw new Error(translatedText);
                    }

                    if (batch.length === 1) {
                        return [translatedText];
                    }

                    return splitTranslatedBatch(translatedText, batch.length);
                }

                lastError = new Error(`HTTP ${response.status}`);
                if (response.status !== 429 || attempt >= MYMEMORY_RETRY_DELAYS_MS.length) {
                    throw lastError;
                }

                await waitForMs(MYMEMORY_RETRY_DELAYS_MS[attempt]);
            }

            throw lastError || new Error('MyMemory translation failed');
        }

        async function translateBatchWithGoogle(batch) {
            const url = new URL('https://translate.googleapis.com/translate_a/single');
            url.searchParams.set('client', 'gtx');
            url.searchParams.set('sl', 'zh-CN');
            url.searchParams.set('tl', 'en');
            url.searchParams.append('dt', 't');
            url.searchParams.set('q', batch.join(TRANSLATE_SEPARATOR));

            const response = await fetch(url.toString());
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const payload = await response.json();
            const segments = Array.isArray(payload?.[0]) ? payload[0] : [];
            const translatedText = segments.map(segment => Array.isArray(segment) ? (segment[0] || '') : '').join('');
            return splitTranslatedBatch(translatedText, batch.length);
        }

        async function readResponseErrorDetail(response) {
            let raw = '';
            try {
                raw = await response.text();
            } catch (_) {
                return '';
            }
            if (!raw) return '';
            try {
                const parsed = JSON.parse(raw);
                return parsed.message || parsed.details || parsed.hint || raw;
            } catch (_) {

        function buildGlobalFilterParams(includeMetricFilters = true) {
            const params = [];
            if (includeMetricFilters) {
                if (currentMinDecode > 0) {
                    params.push(`${getMetricField('decode')}=gte.${currentMinDecode}`);
                }
                if (currentMinPrefill > 0) {
                    params.push(`${getMetricField('prefill')}=gte.${currentMinPrefill}`);
                }
            }
            if (currentHardwareKeyword) {
                params.push(`hardware=ilike.${encodeURIComponent('*' + currentHardwareKeyword + '*')}`);
            }
            return params;
        }

        function buildModeFilterParams(mode, personalUserCode) {
            const params = [];

            if (mode === 'personal' && personalUserCode) {
                params.push(`user_code=eq.${encodeURIComponent(personalUserCode)}`);
            } else if (mode === 'user' && currentTargetUserCode) {
                params.push(`user_code=eq.${encodeURIComponent(currentTargetUserCode)}`);
            } else if (mode === 'model' && currentTargetModelName) {
                params.push(`model_name=eq.${encodeURIComponent(currentTargetModelName)}`);
            } else if (mode === 'search_id' && currentTargetSearch) {
                const q = currentTargetSearch.trim();
                const isUUID = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(q);
                if (isUUID) {
                    params.push(`id=eq.${encodeURIComponent(q)}`);
                } else {
                    const eq = encodeURIComponent(q);
                    const like = encodeURIComponent(`%${q}%`);
                    params.push(`or=(user_code.eq.${eq},nickname.ilike.${like},model_name.ilike.${like})`);
                }
            }

            return params;
        }

            if (!SORTABLE_FIELDS.includes(currentSortKey)) currentSortKey = 'created_at';
            if (currentSortDirection !== 'asc' && currentSortDirection !== 'desc') currentSortDirection = 'desc';
            const sortField = getSortFieldForQuery();

        function buildSupabaseResultsUrl(mode, offset, limit, personalUserCode) {
            const sbBase = SUPABASE_URL + '/rest/v1/speed_results';
            const queryParts = [
                buildResultsSelectFields(),
                'order=created_at.desc',
                `limit=${limit}`,
                `offset=${offset}`,
                ...buildModeFilterParams(mode, personalUserCode),
                ...buildGlobalFilterParams(false)
            ];

        function buildSupabaseModelTagUrl(offset, limit) {
            const sbBase = SUPABASE_URL + '/rest/v1/speed_results';
            const queryParts = [
                buildModelTagSelectFields(),
                'model_name=not.is.null',
                `limit=${limit}`,
                `offset=${offset}`,
                ...buildGlobalFilterParams(false)
            ];
            return `${sbBase}?${queryParts.join('&')}`;
        }

        async function fetchLeaderboardRows(mode, offset, limit, signal, personalUserCode) {
            let url = buildSupabaseResultsUrl(mode, offset, limit, personalUserCode);
            let response = await fetch(url, { signal, headers: SB_HEADERS });
            if (response.ok) return await response.json();

            const detail = await readResponseErrorDetail(response);
            if (response.status === 400 && !isLegacySchemaMode() && isSchemaCompatibilityError(detail)) {
                currentSchemaMode = LEADERBOARD_SCHEMA.LEGACY;
                console.warn('Leaderboard fallback to legacy schema mode:', detail);
                url = buildSupabaseResultsUrl(mode, offset, limit, personalUserCode);
                response = await fetch(url, { signal, headers: SB_HEADERS });
                if (response.ok) return await response.json();
                const retryDetail = await readResponseErrorDetail(response);
                throw new Error(`HTTP error ${response.status}${retryDetail ? `: ${retryDetail}` : ''}`);
            }

            throw new Error(`HTTP error ${response.status}${detail ? `: ${detail}` : ''}`);
        }

        async function fetchAllLeaderboardRows(mode, signal, personalUserCode) {
            const rows = [];
            let offset = 0;

            while (offset < RESULTS_FETCH_LIMIT) {
                const limit = Math.min(RESULTS_FETCH_PAGE_SIZE, RESULTS_FETCH_LIMIT - offset);
                const batch = await fetchLeaderboardRows(mode, offset, limit, signal, personalUserCode);
                if (!Array.isArray(batch) || batch.length === 0) break;
                rows.push(...batch);
                offset += batch.length;
                if (batch.length < limit) break;
            }

            if (offset >= RESULTS_FETCH_LIMIT) {
                console.warn(`Leaderboard fetch reached cap: ${RESULTS_FETCH_LIMIT} rows.`);
            }

            return rows;
        }

        async function fetchModelTags(signal) {
            const counts = new Map();
            let offset = 0;

            while (offset < MODEL_TAG_FETCH_LIMIT) {
                const limit = Math.min(MODEL_TAG_PAGE_SIZE, MODEL_TAG_FETCH_LIMIT - offset);
                let url = buildSupabaseModelTagUrl(offset, limit);
                let response = await fetch(url, { signal, headers: SB_HEADERS });
                if (!response.ok) {
                    const detail = await readResponseErrorDetail(response);
                    if (response.status === 400 && !isLegacySchemaMode() && isSchemaCompatibilityError(detail)) {
                        currentSchemaMode = LEADERBOARD_SCHEMA.LEGACY;
                        console.warn('Model tags fallback to legacy schema mode:', detail);
                        url = buildSupabaseModelTagUrl(offset, limit);
                        response = await fetch(url, { signal, headers: SB_HEADERS });
                    }
                }
                if (!response.ok) {
                    const detail = await readResponseErrorDetail(response);
                    throw new Error(`HTTP error ${response.status}${detail ? `: ${detail}` : ''}`);
                }

                const rows = await response.json();
                if (!Array.isArray(rows) || rows.length === 0) break;

                rows.forEach((row) => {
                    const modelName = (row.model_name || '').trim();
                    if (!modelName) return;
                    if (!passesMetricThresholds(row)) return;
                    counts.set(modelName, (counts.get(modelName) || 0) + 1);
                });

                offset += rows.length;
                if (rows.length < limit) break;
            }

            return Array.from(counts.entries())
                .filter(([, count]) => count >= MODEL_TAG_MIN_COUNT)
                .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'zh-CN'))
                .map(([name, count]) => ({ name, count }));
        }

        function pickDisplaySpeed(maxValue, avgValue) {
            const maxNum = Number(maxValue);
            if (Number.isFinite(maxNum) && maxNum > 0) return maxNum;
            const avgNum = Number(avgValue);
            if (Number.isFinite(avgNum) && avgNum > 0) return avgNum;
            if (Number.isFinite(maxNum)) return maxNum;
            if (Number.isFinite(avgNum)) return avgNum;
            return NaN;
        }

        function getRowMetricValue(row, metricKey) {
            if (metricKey === 'max_prefill_speed') {
                return pickDisplaySpeed(row.max_prefill_speed, row.avg_prefill_speed);
            }
            if (metricKey === 'max_decode_speed') {
                return pickDisplaySpeed(row.max_decode_speed, row.avg_decode_speed);
            }
            return NaN;
        }

        function passesMetricThresholds(row) {
            if (currentMinDecode > 0) {
                const decode = getRowMetricValue(row, 'max_decode_speed');
                if (!Number.isFinite(decode) || decode < currentMinDecode) return false;
            }
            if (currentMinPrefill > 0) {
                const prefill = getRowMetricValue(row, 'max_prefill_speed');
                if (!Number.isFinite(prefill) || prefill < currentMinPrefill) return false;
            }
            return true;
        }

        function compareValuesWithNullLast(aValue, bValue, direction) {
            const aOk = Number.isFinite(aValue);
            const bOk = Number.isFinite(bValue);
            if (aOk && bOk) {
                return direction === 'asc' ? (aValue - bValue) : (bValue - aValue);
            }
            if (aOk && !bOk) return -1;
            if (!aOk && bOk) return 1;
            return 0;
        }

        function compareRowsByCurrentSort(a, b) {
            let primary = 0;
            if (currentSortKey === 'created_at') {
                primary = compareValuesWithNullLast(Date.parse(a.created_at), Date.parse(b.created_at), currentSortDirection);
            } else if (currentSortKey === 'max_prefill_speed' || currentSortKey === 'max_decode_speed') {
                primary = compareValuesWithNullLast(getRowMetricValue(a, currentSortKey), getRowMetricValue(b, currentSortKey), currentSortDirection);
            }
            if (primary !== 0) return primary;
            return compareValuesWithNullLast(Date.parse(a.created_at), Date.parse(b.created_at), 'desc');
        }

        function applyMetricFilterAndSort(rows) {
            const filtered = rows.filter(row => passesMetricThresholds(row));
            filtered.sort(compareRowsByCurrentSort);
            return filtered;
        }
